<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Avaliação Geofísica - Angola</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; display: flex; flex-direction: column; min-height: 95vh; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); flex-grow: 1; position: relative; }
        
        #idArea { background: #f8f9fa; padding: 25px; border-radius: 12px; border: 2px solid #3498db; margin-bottom: 20px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto; }
        .campo { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; box-sizing: border-box; }
        
        #yantikaBtn { width: 100%; padding: 20px; font-size: 1.4em; font-weight: bold; color: white; background-color: #27ae60; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        
        #finalizarBtn { display: none; margin: 30px auto 10px auto; padding: 15px 40px; background: #c0392b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.2em; }

        /* PAINEL FLUTUANTE (No Canto Superior Esquerdo) */
        #painelFlutuante {
            display: none; position: fixed; top: 20px; left: 20px; width: 250px;
            background: rgba(255, 255, 255, 0.98); border: 3px solid #2c3e50;
            border-radius: 12px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 9999; text-align: center;
        }
        
        #painelFlutuante video { width: 100%; border-radius: 8px; border: 2px solid #bdc3c7; margin: 10px 0; background: #000; transform: scaleX(-1); /* Efeito de espelho natural */ }
        
        #placarConfianca { font-size: 1.3em; font-weight: bold; color: #27ae60; padding: 8px; border-radius: 6px; background: #eaeded; border: 2px solid #27ae60; transition: 0.3s; margin-bottom: 10px; }
        
        #sBox { font-size: 0.9em; padding: 10px; border-radius: 6px; font-weight: bold; min-height: 45px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        
        .status-normal { background-color: #dff0d8; color: #3c763d; border-color: #d6e9c6; }
        .status-danger { background-color: #f2dede; color: #c0392b; border-color: #ebccd1; }
        .status-grave { background-color: #000; color: #ff4d4d; border-color: #ff4d4d; animation: piscar 0.8s infinite; }
        @keyframes piscar { 50% { opacity: 0.5; } }

        .audio-track { width: 100%; height: 15px; background: #ecf0f1; border-radius: 8px; overflow: hidden; position: relative; margin-top: 10px; border: 1px solid #bdc3c7; }
        #aBar { width: 0%; height: 100%; background: linear-gradient(90deg, #27ae60, #f1c40f, #e74c3c); transition: width 0.1s; }

        .exam-area { display: none; width: 100%; margin-top: 10px; border-radius: 15px; border: 3px solid #3498db; overflow: hidden; background: white; }
        iframe { width: 100%; height: 850px; border: none; }

        .rodape { margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd; color: #7f8c8d; font-size: 0.95em; }
        .rodape strong { color: #2c3e50; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container">
        <h1>Sistema Integrado de Avaliação Geofísica</h1>
        <p id="instrucoesTxt">Preencha os seus dados para calibração e início do exame.</p>
        
        <div id="idArea">
            <div class="campo"><label>Nome Completo:</label><input type="text" id="mZina"></div>
            <div class="campo"><label>Número de Estudante:</label><input type="text" id="mNtalu"></div>
            <button id="yantikaBtn">CALIBRAR E INICIAR EXAME</button>
        </div>

        <div id="painelFlutuante">
            <div id="placarConfianca">Integridade: 100%</div>
            <div id="sBox" class="status-normal">A aguardar câmara...</div>
            <video id="vCam" autoplay muted playsinline></video>
            <div style="font-size: 0.8em; color: #7f8c8d; font-weight: bold;">🎤 Ruído Ambiente</div>
            <div class="audio-track"><div id="aBar"></div></div>
        </div>

        <video id="vScr" autoplay muted playsinline style="display:none;"></video>

        <div class="exam-area" id="eArea">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeyDMAP2o-ibGcw386HSH0RvzCip3IsAu2wZQq1IQUvHarveyMot8GQ/viewform?embedded=true"></iframe>
        </div>

        <button id="finalizarBtn">FINALIZAR EXAME E ENVIAR RELATÓRIO</button>
    </div>

    <div class="rodape">Desenvolvido pelo <strong>Centro de Estudo Galileu</strong> | Plataforma de Avaliação Soberana © 2026</div>

    <script>
        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycby9YtOYTxPs8ByiUZdngikkNHxwnvZlKyD-til8XDzIRfgV--8J_SeevIAS2OpJJKo/exec";
        
        const vCam = document.getElementById("vCam");
        const sBox = document.getElementById("sBox");
        const placar = document.getElementById("placarConfianca");
        const finalizarBtn = document.getElementById("finalizarBtn");
        const painelFlutuante = document.getElementById("painelFlutuante");
        
        let kuyingila = false;
        let confianca = 100;
        let infrações = [];
        let mazuNza;
        let galeriaFotos = [];

        // Variáveis do Cronómetro de Distração (Regra dos 1.5s)
        let inicioDistracao = 0;
        let estaDistraido = false;

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && kuyingila) {
                samuna("⚠️ GRAVE: Saiu da aba!", "grave");
                subtrair(20, "Mudança de Aba/Navegador detetada");
            }
        });

        const luseMatadi = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        luseMatadi.setOptions({ maxNumFaces: 2, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        luseMatadi.onResults((bima) => {
            if (!kuyingila) return;
            
            let condicaoInfracao = false;
            let msgInfracao = "";

            if (!bima.multiFaceLandmarks || bima.multiFaceLandmarks.length === 0) {
                condicaoInfracao = true;
                msgInfracao = "⚠️ Ausência de rosto!";
            } else if (bima.multiFaceLandmarks.length > 1) {
                samuna("⚠️ Múltiplas pessoas!", "grave"); // Imediato
                subtrair(10, "Presença de terceiros (Possível Cola)");
            } else {
                const rosto = bima.multiFaceLandmarks[0];
                
                // 1. Deteção Labial (Fala)
                const nwaZ = Math.abs(rosto[14].y - rosto[13].y);
                
                // 2. Head Pose (Rotação da Cabeça Esq/Dir)
                // Compara a posição do nariz (1) com os extremos do rosto (234 e 454)
                const propRostoX = (rosto[1].x - rosto[234].x) / (rosto[454].x - rosto[234].x);
                const cabecaVirada = (propRostoX < 0.35 || propRostoX > 0.65);

                // 3. Iris Tracking (Gaze / Vetor do Olhar)
                // Íris direita (473) em relação ao canto do olho (362 e 263)
                const propOlho = (rosto[473].x - rosto[362].x) / (rosto[263].x - rosto[362].x);
                const olharDesviado = (propOlho < 0.35 || propOlho > 0.65);

                if (nwaZ > 0.06) {
                    condicaoInfracao = true; msgInfracao = "⚠️ Possível Comunicação/Fala";
                } else if (cabecaVirada) {
                    condicaoInfracao = true; msgInfracao = "⚠️ Cabeça virada fora do eixo";
                } else if (olharDesviado) {
                    condicaoInfracao = true; msgInfracao = "⚠️ Olhar fixado fora da tela";
                }
            }

            // --- A REGRA DOS 1.5 SEGUNDOS (Persistência) ---
            if (condicaoInfracao) {
                if (!estaDistraido) {
                    estaDistraido = true;
                    inicioDistracao = Date.now(); // Inicia o cronómetro
                } else {
                    let tempoDecorrido = Date.now() - inicioDistracao;
                    if (tempoDecorrido > 1500) { // Se passou de 1.5 segundos (1500ms)
                        samuna(msgInfracao, "danger");
                        subtrair(1, msgInfracao + " (> 1.5s)");
                        inicioDistracao = Date.now(); // Reseta o cronómetro para não descontar tudo de uma vez
                    }
                }
            } else {
                // Voltou a olhar para o centro / Parou de falar
                estaDistraido = false;
                if (sBox.className !== "status-grave") {
                    samuna("✅ Foco Validado", "normal");
                }
            }
        });

        // O Fotógrafo Otimizado (Resolução de 320x240 para não entupir o Google Script)
        function capturarFotoAuditoria() {
            if (galeriaFotos.length < 4 && vCam.readyState === 4 && kuyingila) {
                const canvas = document.createElement("canvas");
                // Resolução reduzida propositadamente para garantir o envio do relatório
                canvas.width = 320; 
                canvas.height = 240;
                canvas.getContext("2d").drawImage(vCam, 0, 0, 320, 240);
                
                // Compressão agressiva mas visível (30% de qualidade)
                galeriaFotos.push(canvas.toDataURL("image/jpeg", 0.3)); 
                
                if(galeriaFotos.length < 4) {
                    // Tira foto a cada 3 a 5 minutos (180000ms a 300000ms) na prova real
                    // (Para testar agora, deixei de 20 a 40 segundos)
                    let tempoAleatorio = Math.floor(Math.random() * (40000 - 20000 + 1)) + 20000;
                    setTimeout(capturarFotoAuditoria, tempoAleatorio);
                }
            }
        }

        function subtrair(pts, motivo) {
            confianca = Math.max(0, confianca - pts);
            if (!infrações.includes(motivo)) infrações.push(motivo);
            
            placar.innerText = "Integridade: " + Math.round(confianca) + "%";
            if(confianca < 70) { placar.style.color = "#c0392b"; placar.style.borderColor = "#c0392b"; }
            else if(confianca < 90) { placar.style.color = "#f39c12"; placar.style.borderColor = "#f39c12"; }
        }

        async function wunikina(s) {
            mazuNza = new (window.AudioContext || window.webkitAudioContext)();
            const nto = mazuNza.createMediaStreamSource(s);
            const fimp = mazuNza.createScriptProcessor(2048, 1, 1);
            nto.connect(fimp); fimp.connect(mazuNza.destination);
            fimp.onaudioprocess = (e) => {
                const m = e.inputBuffer.getChannelData(0);
                let nt = 0; for (let i = 0; i < m.length; i++) nt += m[i] * m[i];
                const vol = Math.min(Math.sqrt(nt / m.length) * 800, 100);
                document.getElementById("aBar").style.width = vol + "%";
                if (vol > 70) {
                    samuna("⚠️ Ruído Alto!", "danger");
                    subtrair(2, "Ruído ambiente elevado");
                }
            };
        }

        document.getElementById("yantikaBtn").addEventListener("click", async () => {
            const nome = document.getElementById("mZina").value;
            const num = document.getElementById("mNtalu").value;
            if (!nome || !num) return alert("Preencha os dados primeiro!");

            document.getElementById("idArea").style.display = "none";
            document.getElementById("instrucoesTxt").innerText = "Sessão Iniciada. O seu comportamento está a ser avaliado pela IA.";
            document.getElementById("eArea").style.display = "block";
            finalizarBtn.style.display = "block";
            painelFlutuante.style.display = "block";

            try {
                const t1 = await navigator.mediaDevices.getDisplayMedia({ video: true });
                document.getElementById("vScr").srcObject = t1;
            } catch (err) {
                subtrair(5, "Recusou ou falhou partilha de ecrã");
            }

            try {
                const t2 = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                vCam.srcObject = t2;
                await wunikina(t2);
                await luseMatadi.initialize();
                kuyingila = true;
                
                capturarFotoAuditoria();

                function luzingu() { 
                    if (kuyingila) { 
                        luseMatadi.send({image: vCam}); 
                        requestAnimationFrame(luzingu); 
                    } 
                }
                luzingu();
            } catch (err) { 
                alert("Erro grave: É obrigatório permitir câmara e microfone."); location.reload(); 
            }
        });

        finalizarBtn.addEventListener("click", async () => {
            if (!confirm("Deseja finalizar a prova e submeter a auditoria?")) return;
            
            finalizarBtn.innerText = "A Enviar (Aguarde alguns segundos)...";
            finalizarBtn.disabled = true;
            kuyingila = false;
            painelFlutuante.style.display = "none";

            const dados = {
                nome: document.getElementById("mZina").value,
                numero: document.getElementById("mNtalu").value,
                confianca: Math.round(confianca),
                observacoes: infrações.length > 0 ? infrações.join(" | ") : "Nenhuma infração detetada",
                fotos: galeriaFotos
            };

            try {
                await fetch(WEBHOOK_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(dados) });
                alert("Relatório Entregue! A sua sessão foi registada pelo Centro de Estudo Galileu.");
                location.reload();
            } catch (e) {
                alert("Ocorreu uma falha no envio. Contacte o Professor.");
                finalizarBtn.disabled = false;
            }
        });

        function samuna(msg, tipo) {
            sBox.innerText = msg;
            sBox.className = "status-" + tipo;
        }
    </script>
</body>
</html>
