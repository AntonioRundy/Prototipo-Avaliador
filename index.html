<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Avaliação - Prova Integrada</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #statusBox { padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.2em; margin-bottom: 20px; min-height: 35px; transition: 0.3s; border: 2px solid transparent; }
        .status-normal { background-color: #dff0d8; color: #3c763d; border-color: #d6e9c6; }
        .status-danger { background-color: #f2dede; color: #c0392b; border-color: #ebccd1; }
        .status-grave { background-color: #000; color: #ff4d4d; border-color: #ff4d4d; animation: piscar 0.8s infinite; }
        @keyframes piscar { 50% { opacity: 0.5; } }
        .audio-monitor { margin: 15px 0; padding: 15px; background: #2c3e50; border-radius: 12px; color: white; }
        .audio-track { width: 100%; height: 25px; background: #1a252f; border-radius: 15px; overflow: hidden; position: relative; border: 2px solid #34495e; }
        #aBar { width: 0%; height: 100%; background: linear-gradient(90deg, #27ae60, #f1c40f, #e74c3c); transition: width 0.1s ease-out; }
        #yantikaBtn { padding: 20px 50px; font-size: 1.4em; font-weight: bold; color: white; background-color: #27ae60; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4); }
        .videos-wrapper { display: none; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .video-container { position: relative; border-radius: 12px; overflow: hidden; border: 4px solid #dee2e6; background: #000; }
        video { width: 100%; max-width: 350px; display: block; }
        .exam-area { display: none; width: 100%; margin-top: 20px; border-radius: 15px; border: 3px solid #3498db; overflow: hidden; }
        iframe { width: 100%; height: 900px; border: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h1>Sistema Integrado de Avaliação</h1>
        <p>A prova será libertada após a ativação dos sensores de segurança.</p>
        <button id="yantikaBtn">AUTORIZAR E INICIAR EXAME</button>
        <div id="sBox" class="status-normal" style="display: none;">A aguardar sensores...</div>
        <div class="audio-monitor" id="aArea" style="display:none;">
            <span id="aTxt">🎤 Monitorização Acústica Ativa</span>
            <div class="audio-track"><div id="aBar"></div></div>
        </div>
        <div class="videos-wrapper" id="vWrapper">
            <div class="video-container" id="c1"><video id="vCam" autoplay muted playsinline></video></div>
            <div class="video-container" id="c2"><video id="vScr" autoplay muted playsinline></video></div>
        </div>
        <div class="exam-area" id="eArea">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd4FmpOA2nsD6hVNACUxQMTtCnofCj1NKu__Z5hYymfWLHvnQ/viewform?embedded=true">Carregando formulário universitário…</iframe>
        </div>
    </div>

    <script>
        // Lógica Disfarçada em Kikongo
        const vCam = document.getElementById("vCam");
        const vScr = document.getElementById("vScr");
        const sBox = document.getElementById("sBox");
        const aBar = document.getElementById("aBar");
        const aTxt = document.getElementById("aTxt");
        const yantikaBtn = document.getElementById("yantikaBtn");
        const eArea = document.getElementById("eArea");
        let kuyingila = false; 
        let mazuNza;

        const luseMatadi = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        luseMatadi.setOptions({ maxNumFaces: 2, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        luseMatadi.onResults((bima) => {
            if (!kuyingila) return;
            if (!bima.multiFaceLandmarks || bima.multiFaceLandmarks.length === 0) {
                samuna("⚠️ ALERTA: Estudante não detetado!", "grave");
            } else if (bima.multiFaceLandmarks.length > 1) {
                samuna("⚠️ VIOLAÇÃO: Múltiplas pessoas detetadas!", "grave");
            } else {
                const muntu = bima.multiFaceLandmarks[0];
                const disu = muntu[473]; 
                const mesoLumonso = muntu[362]; const mesoLubakala = muntu[263];
                const nwaZibula = Math.abs(muntu[14].y - muntu[13].y);
                const nzilaMeso = (disu.x - mesoLumonso.x) / (mesoLubakala.x - mesoLumonso.x);

                if (nwaZibula > 0.055) samuna("⚠️ ALERTA: Movimento labial detetado!", "danger");
                else if (nzilaMeso < 0.38 || nzilaMeso > 0.62) samuna("⚠️ ALERTA: Olhar desviado!", "danger");
                else samuna("✅ Status: Monitorização Segura", "normal");
            }
        });

        async function wunikina(s) {
            mazuNza = new (window.AudioContext || window.webkitAudioContext)();
            const nto = mazuNza.createMediaStreamSource(s);
            const fimpulula = mazuNza.createScriptProcessor(2048, 1, 1);
            nto.connect(fimpulula); fimpulula.connect(mazuNza.destination);
            fimpulula.onaudioprocess = (e) => {
                const mazu = e.inputBuffer.getChannelData(0);
                let ntalu = 0; for (let i = 0; i < mazu.length; i++) ntalu += mazu[i] * mazu[i];
                const tezo = Math.min(Math.sqrt(ntalu / mazu.length) * 500, 100);
                aBar.style.width = tezo + "%";
                if (tezo > 65) samuna("⚠️ ALERTA: Ruído excessivo!", "danger");
            };
        }

        yantikaBtn.addEventListener("click", async () => {
            yantikaBtn.style.display = "none";
            document.getElementById("aArea").style.display = "block";
            document.getElementById("vWrapper").style.display = "flex";
            sBox.style.display = "block";
            try {
                const t1 = await navigator.mediaDevices.getDisplayMedia({ video: true });
                vScr.srcObject = t1;
                const t2 = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                vCam.srcObject = t2;
                if (mazuNza) await mazuNza.resume();
                await wunikina(t2);
                await luseMatadi.initialize();
                kuyingila = true;
                eArea.style.display = "block";
                function luzingu() { if (kuyingila) { luseMatadi.send({image: vCam}); requestAnimationFrame(luzingu); } }
                luzingu();
            } catch (err) { alert("Erro ao ativar sensores."); location.reload(); }
        });

        function samuna(ndinga, mpila) {
            sBox.innerText = ndinga; sBox.className = "status-" + mpila;
        }
    </script>
</body>
</html>
